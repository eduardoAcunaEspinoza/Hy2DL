experiment_name: LSTM_CAMELS_DE_1h_benchmark
path_data: ../data/CAMELS-DE-1h
path_entities: ../data/basin_id/basins_camels_de_1h_1611.txt
dynamic_input:
  1W:
  - precipitation_mean_gapfilled
  - precipitation_stdev_gapfilled
  - air_temperature_mean
  - global_radiation_mean
  - air_pressure_surface_mean
  - relative_humidity_mean
  - wind_speed_mean
  - cloud_cover_mean
  1D:
  - precipitation_mean_gapfilled
  - precipitation_stdev_gapfilled
  - air_temperature_mean
  - global_radiation_mean
  - air_pressure_surface_mean
  - relative_humidity_mean
  - wind_speed_mean
  - cloud_cover_mean
  1h:
  - precipitation_mean_gapfilled
  - precipitation_stdev_gapfilled
  - air_temperature_mean
  - global_radiation_mean
  - air_pressure_surface_mean
  - relative_humidity_mean
  - wind_speed_mean
  - cloud_cover_mean
target:
  - discharge_spec_obs
static_input:
  - area
  - elev_mean
  - clay_0_30cm_mean
  - sand_0_30cm_mean
  - silt_0_30cm_mean
  - artificial_surfaces_perc
  - agricultural_areas_perc
  - forests_and_seminatural_areas_perc
  - wetlands_perc
  - water_bodies_perc
  - p_mean
  - p_seasonality
  - frac_snow
  - high_prec_freq
  - low_prec_freq
  - high_prec_dur
  - low_prec_dur
training_period:
- '2004-01-01 01:00:00'
- '2019-12-31 23:00:00'
validation_period:
- '2001-01-01 01:00:00'
- '2003-12-31 23:00:00'
testing_period:
- '2020-01-01 01:00:00'
- '2024-12-31 23:00:00'
hidden_size: 128
batch_size_training: 256
batch_size_evaluation: 1024
epochs: 20
dropout_rate: 0.4
learning_rate:
  1: 0.0005
  5: 0.0001
  8: 5.0e-05
validate_every: 5
seq_length: 8760
custom_seq_processing:
  1W:
    n_steps: 24
    freq_factor: 168
  1D:
    n_steps: 193
    freq_factor: 24
  1h:
    n_steps: 96
    freq_factor: 1
custom_seq_processing_flag: true
predict_last_n: 1
unique_prediction_blocks: false
dynamic_embedding:
  hiddens:
  - 8
device: gpu
num_workers: 76
random_seed: 100
dataset: hourly_camels_de
model: CudaLSTM
initial_forget_bias: 3.0
dataset_in_ram: True
