# Supervised multi-target LSTM on CAMELS-DE with variable-averaged MSE loss.
#
# Demonstrates the VariableAveragedMSE loss, which averages per-target MSE before
# averaging across targets. This weights every target equally regardless of how many
# valid (non-NaN) observations each one has, useful when targets have strongly
# imbalanced sample coverage (e.g. a discharge target observed daily alongside
# sparse meteorological signals).

experiment_name: LSTM_Multitarget_CAMELS_DE
path_data: ../data/CAMELS_DE
path_entities: ../data/basin_id/basins_camels_de_1582.txt
dynamic_input:
- precipitation_mean
- precipitation_stdev
- radiation_global_mean
- temperature_min
- temperature_max
target:
- discharge_spec
- temperature_min
- temperature_max
static_input:
- area
- elev_mean
- clay_0_30cm_mean
- sand_0_30cm_mean
- silt_0_30cm_mean
- artificial_surfaces_perc
- agricultural_areas_perc
- forests_and_seminatural_areas_perc
- wetlands_perc
- water_bodies_perc
- p_mean
- p_seasonality
- frac_snow
- high_prec_freq
- low_prec_freq
- high_prec_dur
- low_prec_dur
training_period:
- '1970-10-01'
- '1999-12-31'
validation_period:
- '1965-10-01'
- '1970-09-30'
testing_period:
- '2000-01-01'
- '2020-12-31'
seq_length: 365
hidden_size: 256
batch_size_training: 256
batch_size_evaluation: 1024
epochs: 20
dropout_rate: 0.4
learning_rate: 0.001
steplr_step_size: 10
steplr_gamma: 0.5
validate_every: 4
device: gpu
num_workers: 4
random_seed: 110
dataset: camels_de
model: CudaLSTM
initial_forget_bias: 3.0
predict_last_n: 1
output_features: 3
loss: variable_averaged_mse
