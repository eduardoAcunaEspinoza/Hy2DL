experiment_name: camels_us_missinginputs_mme
path_data: ../data/CAMELS_US
path_entities: ../data/basin_id/basins_camels_us_531.txt
dynamic_input:
  daymet:
  - prcp(mm/day)_daymet
  - srad(W/m2)_daymet
  - tmax(C)_daymet
  - tmin(C)_daymet
  - vp(Pa)_daymet
  nldas:
  - PRCP(mm/day)_nldas_extended
  - SRAD(W/m2)_nldas_extended
  - Tmax(C)_nldas_extended
  - Tmin(C)_nldas_extended
  - Vp(Pa)_nldas_extended
  maurer:
  - prcp(mm/day)_maurer_extended
  - srad(W/m2)_maurer_extended
  - tmax(C)_maurer_extended
  - tmin(C)_maurer_extended
  - vp(Pa)_maurer_extended
target:
- QObs(mm/d)
forcings:
- daymet
- nldas_extended
- maurer_extended
static_input:
- elev_mean
- slope_mean
- area_gages2
- frac_forest
- lai_max
- lai_diff
- gvf_max
- gvf_diff
- soil_depth_pelletier
- soil_depth_statsgo
- soil_porosity
- soil_conductivity
- max_water_content
- sand_frac
- silt_frac
- clay_frac
- carbonate_rocks_frac
- geol_permeability
- p_mean
- pet_mean
- aridity
- frac_snow
- high_prec_freq
- high_prec_dur
- low_prec_freq
- low_prec_dur
training_period:
- '1999-10-01'
- '2008-09-30'
validation_period:
- '1980-10-01'
- '1989-09-30'
testing_period:
- '1989-10-01'
- '1999-10-30'
hidden_size: 256
batch_size_training: 256
batch_size_evaluation: 1024
epochs: 35
dropout_rate: 0.4
learning_rate:
  1: 0.001
  10: 0.0005
  25: 0.0001
validate_every: 3
seq_length_hindcast: 365
dynamic_embedding:
  hiddens:
  - 10
  - 10
  - 10
  - 10
device: cuda:0
num_workers: 4
dataset: camels_us
model: CudaLSTM
initial_forget_bias: 3.0
nan_handling_method: masked_mean
nan_probabilistic_masking: true
nan_probability:
  daymet:
    nan_seq: 0.0
    nan_step: 0.2
  nldas:
    nan_seq: 0.0
    nan_step: 0.2
  maurer:
    nan_seq: 0.0
    nan_step: 0.2
